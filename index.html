<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONK HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2800;
    --bg: #080808;
    --bg2: #0e0e0e;
    --bg3: #141414;
    --border: #1c1c1c;
    --text: #ddd9d0;
    --muted: #444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,8,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 5px;
    color: var(--red);
    text-shadow: 0 0 28px rgba(255,40,0,0.45);
    user-select: none;
    flex-shrink: 0;
  }
  .logo span { color: var(--text); }
  .logo:hover { animation: glitch 0.25s steps(2) infinite; }
  @keyframes glitch {
    0%   { text-shadow: 2px 0 var(--red), -2px 0 #0ff; }
    50%  { text-shadow: -2px 0 var(--red), 2px 0 #0ff; }
    100% { text-shadow: 2px 0 #0ff, -2px 0 var(--red); }
  }
  .search-wrap {
    flex: 1;
    max-width: 320px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 14px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.5px;
  }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* channel tabs */
  .chan-tabs {
    display: flex;
    gap: 6px;
  }
  .chan-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .chan-tab:hover, .chan-tab.active {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,40,0,0.07);
  }

  .vid-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 20px;
    gap: 20px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    text-align: center;
    padding: 100px 20px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 2.2;
  }
  .error-msg b {
    color: var(--red);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    display: block;
    margin-bottom: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    padding: 28px 32px 48px;
  }
  .card {
    cursor: pointer;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card:hover .thumb { border-color: #2a2a2a; }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s, filter 0.3s;
    filter: brightness(0.85) saturate(0.75);
  }
  .card:hover .thumb img {
    transform: scale(1.04);
    filter: brightness(1) saturate(1);
  }
  .thumb-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.25);
  }
  .card:hover .thumb-overlay { opacity: 1; }
  .play-ring {
    width: 44px;
    height: 44px;
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  .card:hover .play-ring {
    background: var(--red);
    border-color: var(--red);
    transform: scale(1.08);
  }
  .play-tri {
    width: 0; height: 0;
    border-style: solid;
    border-width: 8px 0 8px 14px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }
  .card-title {
    margin-top: 9px;
    font-size: 11.5px;
    line-height: 1.5;
    color: #888;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: color 0.12s;
    letter-spacing: 0.3px;
  }
  .card:hover .card-title { color: var(--text); }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 900px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    animation: modalIn 0.18s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.97) translateY(8px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* player wrapper — iframe sits inside this */
  .modal-player {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    position: relative;
  }
  .modal-player iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .modal-footer {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .modal-title {
    font-size: 11px;
    color: #777;
    letter-spacing: 0.3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }

  /* speed controls */
  .speed-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .speed-btns {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .spd {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 4px 9px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.1s;
    letter-spacing: 0.5px;
  }
  .spd:hover { border-color: #333; color: #aaa; }
  .spd.active { border-color: var(--red); color: var(--red); background: rgba(255,40,0,0.08); }

  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 1px;
    flex-shrink: 0;
    transition: all 0.12s;
    letter-spacing: 1px;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  footer {
    border-top: 1px solid var(--border);
    padding: 18px 32px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
  @media (max-width: 640px) {
    nav { padding: 0 14px; gap: 10px; flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; }
    .vid-count { display: none; }
    .grid { padding: 14px 14px 40px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">PHONK<span>HUB</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="search..." autocomplete="off" />
  </div>
  <div class="chan-tabs">
    <button class="chan-tab active" data-ch="all">ALL</button>
    <button class="chan-tab" data-ch="main">PHONK HUB</button>
    <button class="chan-tab" data-ch="alt">BRAZILIAN PHONK</button>
  </div>
  <div class="vid-count" id="vidCount"></div>
</nav>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <span>LOADING PHONK</span>
</div>
<div id="errorMsg" class="error-msg">
  <b>FAILED TO LOAD</b>
  could not fetch videos. check your api key or try again later.
</div>
<div class="grid" id="grid" style="display:none"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-player">
      <iframe id="modalFrame" allow="autoplay; fullscreen" allowfullscreen
        src="about:blank"></iframe>
    </div>
    <div class="modal-footer">
      <div class="modal-title" id="modalTitle"></div>
      <span class="speed-label">SPEED</span>
      <div class="speed-btns" id="speedBtns">
        <button class="spd" data-speed="0.5">0.5×</button>
        <button class="spd" data-speed="0.75">0.75×</button>
        <button class="spd active" data-speed="1">1×</button>
        <button class="spd" data-speed="1.25">1.25×</button>
        <button class="spd" data-speed="1.5">1.5×</button>
        <button class="spd" data-speed="2">2×</button>
      </div>
      <button class="modal-close" onclick="closeModal()">✕ CLOSE</button>
    </div>
  </div>
</div>

<footer>
  <span>PHONKHUB</span>
  <span>@phonkhub68</span>
</footer>

<script>
const API_KEY = 'AIzaSyDBpus_pKsTecCCo7EftMc_Ftl1AsYSfNQ';
const CHANNELS = {
  main: 'UC0BQqJ2w9RwVwgNILHN9Bjg',
  alt:  'UC6ZWs0a2x6CRxbmclMrcK-w'
};

let allVideos = [];
let activeChannel = 'all';
let currentVideoId = null;
let currentSpeed = 1;
let player = null; // YouTube IFrame API player

// ── YouTube IFrame API ──────────────────────────────────────
window.onYouTubeIframeAPIReady = function() { /* ready */ };

function loadYTApi() {
  if (window.YT) return;
  const s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

function createPlayer(videoId) {
  if (player) { player.destroy(); player = null; }
  const container = document.getElementById('modalFrame');
  container.id = 'yt-player-' + Date.now();
  player = new YT.Player(container.id, {
    videoId,
    playerVars: { autoplay: 1, rel: 0, modestbranding: 1 },
    events: {
      onReady: e => {
        e.target.setPlaybackRate(currentSpeed);
        e.target.playVideo();
      }
    }
  });
  // give new iframe element the id back for next time
  const newFrame = document.querySelector('#' + container.id + ' iframe') || document.getElementById(container.id);
  if (newFrame && newFrame.tagName === 'IFRAME') newFrame.id = 'modalFrame';
}

// ── Fetch all videos from both channels ──────────────────────
async function fetchChannel(channelId, label) {
  const chanRes = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}&key=${API_KEY}`
  );
  const chanData = await chanRes.json();
  if (!chanData.items || !chanData.items.length) throw new Error('channel not found: ' + channelId);
  const uploadsId = chanData.items[0].contentDetails.relatedPlaylists.uploads;

  let videos = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&key=${API_KEY}` + (pageToken ? `&pageToken=${pageToken}` : '');
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    for (const item of (data.items || [])) {
      const s = item.snippet;
      const videoId = s.resourceId?.videoId;
      if (!videoId || s.title === 'Private video' || s.title === 'Deleted video') continue;
      videos.push({ videoId, title: s.title, channel: label });
    }
    pageToken = data.nextPageToken || '';
  } while (pageToken);
  return videos;
}

async function fetchAll() {
  try {
    const [main, alt] = await Promise.all([
      fetchChannel(CHANNELS.main, 'main'),
      fetchChannel(CHANNELS.alt, 'alt')
    ]);
    allVideos = [...main, ...alt];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
  }
}

// ── Render ────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return allVideos.filter(v => {
    const chanMatch = activeChannel === 'all' || v.channel === activeChannel;
    const searchMatch = !q || v.title.toLowerCase().includes(q);
    return chanMatch && searchMatch;
  });
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const videos = getFiltered();
  document.getElementById('vidCount').textContent = videos.length + ' VIDEOS';

  if (!videos.length) {
    grid.innerHTML = '<div class="no-results">NO RESULTS</div>';
    return;
  }

  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i * 0.02, 0.5) + 's';
    card.innerHTML = `
      <div class="thumb">
        <img src="https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg" alt="" loading="lazy" />
        <div class="thumb-overlay">
          <div class="play-ring"><div class="play-tri"></div></div>
        </div>
      </div>
      <div class="card-title">${escH(v.title)}</div>
    `;
    card.querySelector('.thumb').addEventListener('click', () => openModal(v.videoId, v.title));
    grid.appendChild(card);
  });
}

// ── Channel tabs ──────────────────────────────────────────────
document.querySelectorAll('.chan-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    activeChannel = btn.dataset.ch;
    document.querySelectorAll('.chan-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', render);

// ── Modal / Player ────────────────────────────────────────────
function openModal(id, title) {
  currentVideoId = id;
  currentSpeed = 1;
  document.querySelectorAll('.spd').forEach(b => b.classList.toggle('active', b.dataset.speed === '1'));
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (window.YT && YT.Player) {
    createPlayer(id);
  } else {
    // fallback: plain iframe embed
    const frame = document.getElementById('modalFrame');
    frame.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
  }
}

function closeModal() {
  if (player) { try { player.destroy(); } catch(e){} player = null; }
  const frame = document.getElementById('modalFrame');
  frame.src = 'about:blank';
  frame.id = 'modalFrame';
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
  currentVideoId = null;
}

// Speed buttons
document.getElementById('speedBtns').addEventListener('click', e => {
  const btn = e.target.closest('.spd');
  if (!btn) return;
  currentSpeed = parseFloat(btn.dataset.speed);
  document.querySelectorAll('.spd').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (player && player.setPlaybackRate) {
    player.setPlaybackRate(currentSpeed);
  } else {
    // reload iframe with speed note (best effort for non-API embed)
    const frame = document.getElementById('modalFrame');
    if (frame && currentVideoId) {
      frame.src = `https://www.youtube-nocookie.com/embed/${currentVideoId}?autoplay=1&rel=0&modestbranding=1`;
    }
  }
});

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadYTApi();
fetchAll();
</script>
<script src="https://www.youtube.com/iframe_api" async></script>
</body>
</html>
