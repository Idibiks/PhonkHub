<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONK HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2800;
    --bg: #080808;
    --bg2: #0e0e0e;
    --bg3: #141414;
    --border: #1c1c1c;
    --text: #ddd9d0;
    --muted: #444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,8,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 5px;
    color: var(--red);
    text-shadow: 0 0 28px rgba(255,40,0,0.45);
    user-select: none;
    flex-shrink: 0;
  }
  .logo span { color: var(--text); }
  .logo:hover { animation: glitch 0.25s steps(2) infinite; }
  @keyframes glitch {
    0%   { text-shadow: 2px 0 var(--red), -2px 0 #0ff; }
    50%  { text-shadow: -2px 0 var(--red), 2px 0 #0ff; }
    100% { text-shadow: 2px 0 #0ff, -2px 0 var(--red); }
  }
  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 14px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.5px;
  }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: var(--muted); }
  .vid-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 20px;
    gap: 20px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    display: none;
    text-align: center;
    padding: 100px 20px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    line-height: 2.2;
  }
  .error-msg b {
    color: var(--red);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    display: block;
    margin-bottom: 10px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    padding: 28px 32px 48px;
  }
  .card {
    cursor: pointer;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card:hover .thumb { border-color: #2a2a2a; }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s, filter 0.3s;
    filter: brightness(0.85) saturate(0.75);
  }
  .card:hover .thumb img {
    transform: scale(1.04);
    filter: brightness(1) saturate(1);
  }
  .thumb-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(0,0,0,0.25);
  }
  .card:hover .thumb-overlay { opacity: 1; }
  .play-ring {
    width: 44px;
    height: 44px;
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  .card:hover .play-ring {
    background: var(--red);
    border-color: var(--red);
    transform: scale(1.08);
  }
  .play-tri {
    width: 0; height: 0;
    border-style: solid;
    border-width: 8px 0 8px 14px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }
  .card-title {
    margin-top: 9px;
    font-size: 11.5px;
    line-height: 1.5;
    color: #888;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: color 0.12s;
    letter-spacing: 0.3px;
  }
  .card:hover .card-title { color: var(--text); }
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 880px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    animation: modalIn 0.18s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.97) translateY(8px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal-player { width: 100%; aspect-ratio: 16/9; background: #000; }
  .modal-player iframe { width: 100%; height: 100%; border: none; display: block; }
  .modal-footer {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    border-top: 1px solid var(--border);
  }
  .modal-title {
    font-size: 12px;
    color: #777;
    letter-spacing: 0.3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 1px;
    flex-shrink: 0;
    transition: all 0.12s;
    letter-spacing: 1px;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  footer {
    border-top: 1px solid var(--border);
    padding: 18px 32px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
  }
  @media (max-width: 600px) {
    nav { padding: 0 16px; gap: 12px; }
    .vid-count { display: none; }
    .grid { padding: 16px 16px 40px; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">PHONK<span>HUB</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="search..." autocomplete="off" />
  </div>
  <div class="vid-count" id="vidCount"></div>
</nav>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <span>LOADING PHONK</span>
</div>
<div id="errorMsg" class="error-msg">
  <b>FAILED TO LOAD</b>
  could not fetch videos.<br>check your api key or try again later.
</div>
<div class="grid" id="grid" style="display:none"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-player">
      <iframe id="modalFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    <div class="modal-footer">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕ CLOSE</button>
    </div>
  </div>
</div>

<footer>
  <span>PHONKHUB</span>
  <span>@phonkhub68</span>
</footer>

<script>
const API_KEY = 'AIzaSyDBpus_pKsTecCCo7EftMc_Ftl1AsYSfNQ';
const CHANNEL_ID = 'UC0BQqJ2w9RwVwgNILHN9Bjg';

let allVideos = [];

async function fetchAllVideos() {
  try {
    // Step 1: get uploads playlist id
    const chanRes = await fetch(
      `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`
    );
    const chanData = await chanRes.json();
    if (!chanData.items || chanData.items.length === 0) throw new Error('channel not found');
    const uploadsPlaylistId = chanData.items[0].contentDetails.relatedPlaylists.uploads;

    // Step 2: page through all videos in uploads playlist
    let videos = [];
    let pageToken = '';
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsPlaylistId}&maxResults=50&key=${API_KEY}` + (pageToken ? `&pageToken=${pageToken}` : '');
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      for (const item of (data.items || [])) {
        const s = item.snippet;
        const videoId = s.resourceId?.videoId;
        if (!videoId || videoId === 'deleted') continue;
        videos.push({ videoId, title: s.title });
      }
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    allVideos = videos;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
  }
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) return allVideos;
  return allVideos.filter(v => v.title.toLowerCase().includes(q));
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const videos = getFiltered();
  document.getElementById('vidCount').textContent = videos.length + ' VIDEOS';

  if (videos.length === 0) {
    grid.innerHTML = '<div class="no-results">NO RESULTS</div>';
    return;
  }

  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i * 0.025, 0.6) + 's';
    card.innerHTML = `
      <div class="thumb" onclick="openModal('${v.videoId}', ${JSON.stringify(v.title)})">
        <img src="https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg" alt="" loading="lazy" />
        <div class="thumb-overlay">
          <div class="play-ring"><div class="play-tri"></div></div>
        </div>
      </div>
      <div class="card-title">${escH(v.title)}</div>
    `;
    grid.appendChild(card);
  });
}

document.getElementById('searchInput').addEventListener('input', render);

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal(id, title) {
  document.getElementById('modalFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalFrame').src = '';
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

fetchAllVideos();
</script>
</body>
</html>
